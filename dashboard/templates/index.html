<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Tidtam GPS</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Share+Tech+Mono&display=swap');

    :root {
      --teal:    #0D9488;
      --teal-md: #14B8A6;
      --teal-lt: #CCFBF1;
      --teal-bd: #99F6E4;
      --salmon:  #F43F5E;
      --amber:   #F59E0B;
      --green:   #22C55E;
      --gray:    #9CA3AF;
      --bg:      #F0FDFA;
      --surface: #FFFFFF;
      --border:  #E2E8F0;
      --text:    #134E4A;
      --dim:     #64748B;
      --sidebar: 320px;
      --hdr:     52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); }

    /* ── animations ── */
    @keyframes zFloat   { 0%{opacity:0;transform:translateY(0)scale(.7)} 25%{opacity:1} 100%{opacity:0;transform:translateY(-18px)scale(1.2)} }
    @keyframes puffOut  { 0%{opacity:.75;transform:translate(0,0)scale(.6)} 100%{opacity:0;transform:translate(-22px,-4px)scale(1.6)} }
    @keyframes spdFlick { 0%,100%{opacity:.7;transform:scaleX(1)} 50%{opacity:.2;transform:scaleX(.6)} }
    @keyframes mPulse   { 0%{transform:scale(1);opacity:1} 70%{transform:scale(2.5);opacity:0} 100%{opacity:0} }
    @keyframes slideIn  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

    .z1{animation:zFloat 2.2s ease-in-out 0s infinite}
    .z2{animation:zFloat 2.2s ease-in-out .7s infinite}
    .z3{animation:zFloat 2.2s ease-in-out 1.4s infinite}
    .puff1{animation:puffOut 1.1s ease-out 0s infinite}
    .puff2{animation:puffOut 1.1s ease-out .37s infinite}
    .puff3{animation:puffOut 1.1s ease-out .74s infinite}
    .spd1{animation:spdFlick .6s ease-in-out 0s   infinite;transform-origin:right center}
    .spd2{animation:spdFlick .6s ease-in-out .2s  infinite;transform-origin:right center}
    .spd3{animation:spdFlick .6s ease-in-out .4s  infinite;transform-origin:right center}
    .mp  {animation:mPulse   1.8s ease-out   0s   infinite}

    @keyframes driveJiggle { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-.6px,.4px)} 50%{transform:translate(0,-.5px)} 75%{transform:translate(.6px,.4px)} }
    @keyframes dustFloat   { 0%,100%{opacity:.25;transform:translateY(0) scale(.7)} 50%{opacity:1;transform:translateY(-3px) scale(1.1)} }
    @keyframes userPulse   { 0%{transform:scale(.7);opacity:.9} 100%{transform:scale(2.6);opacity:0} }

    .logo.driving .logo-svg { animation: driveJiggle .15s linear infinite; }
    .logo.driving .puff1, .logo.driving .puff2, .logo.driving .puff3 { animation-duration: .45s; }
    .logo.driving .spd1, .logo.driving .spd2, .logo.driving .spd3   { animation-duration: .2s; }

    /* ════════════════════════════
       HEADER
    ════════════════════════════ */
    #hdr {
      position: fixed; inset: 0 0 auto 0; height: var(--hdr); z-index: 600;
      background: var(--surface); border-bottom: 2px solid var(--teal-bd);
      box-shadow: 0 2px 10px rgba(13,148,136,.10);
      display: flex; align-items: center; gap: 8px; padding: 0 14px;
    }

    /* hamburger — always visible */
    #menu-btn {
      width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--teal-bd);
      background: var(--teal-lt); color: var(--teal); font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; flex-shrink: 0; white-space: nowrap; line-height: 1; cursor: pointer; }
    .logo-svg { width: 30px; height: 18px; flex-shrink: 0; overflow: visible; }
    .logo-text { font-size: .56rem; font-weight: 800; letter-spacing: .9px; line-height: 1; font-family: 'Kanit', sans-serif; }
    .logo-text .lg { color: var(--teal); }
    .logo-text .lp { color: var(--salmon); }

    /* stats row — scrollable on small screens */
    .hstats {
      display: flex; gap: 6px; flex: 1;
      overflow-x: auto; scrollbar-width: none;
    }
    .hstats::-webkit-scrollbar { display: none; }
    .hstat {
      flex-shrink: 0; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 3px 10px; text-align: center;
      cursor: pointer; transition: all .15s; user-select: none;
    }
    .hstat:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(13,148,136,.15); }
    .hstat.active { background: var(--teal-lt) !important; border-color: var(--teal-md) !important; }
    .hstat .v { font-family:'Share Tech Mono',monospace; font-size:1.1rem; font-weight:bold; line-height:1.1; }
    .hstat .l { font-size:.55rem; color: var(--dim); }
    .hstat.ht{border-color:var(--teal-bd)}  .hstat.ht .v{color:var(--teal)}
    .hstat.hm{border-color:#86EFAC}         .hstat.hm .v{color:#16A34A}
    .hstat.hs{border-color:#FCD34D}         .hstat.hs .v{color:var(--amber)}
    .hstat.ho{border-color:var(--border)}   .hstat.ho .v{color:var(--gray)}
    .hstat.ha{border-color:#FCA5A5}         .hstat.ha .v{color:#DC2626}
    .hstat.ha[data-active="1"] .v{animation:alertPulse 1.4s ease-in-out infinite}
    @keyframes alertPulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* per-vehicle alert badge in sidebar cards */
    .alert-pill { display:inline-flex; align-items:center; gap:2px; font-size:.55rem; font-weight:700;
      padding:1px 6px; border-radius:99px; margin-left:4px; }
    .alert-pill.warn { background:#FEF3C7; color:#92400E; border:1px solid #FCD34D; }
    .alert-pill.crit { background:#FEE2E2; color:#991B1B; border:1px solid #FCA5A5; }
    .vcard.has-alert { border-left:3px solid #DC2626; }

    /* popup alert section */
    .pop-alerts { margin-top:6px; padding:6px 8px; background:#FEF2F2; border-left:3px solid #DC2626;
      border-radius:4px; font-size:11px; color:#7F1D1D; }
    .pop-alerts b { color:#991B1B; }

    /* HISTORY MODAL — Phase 4c */
    .hist-modal { display:none; position:fixed; inset:0; background:rgba(15,23,42,.55); z-index:5000;
      align-items:center; justify-content:center; padding:20px; }
    .hist-panel { background:#fff; width:100%; max-width:980px; height:100%; max-height:680px;
      border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.3); display:flex; flex-direction:column;
      overflow:hidden; }
    .hist-head { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .hist-title { font-weight:700; font-size:.95rem; color:var(--teal); flex-shrink:0; }
    .hist-title span { font-family:'Share Tech Mono',monospace; color:#0F172A; margin-left:6px; }
    .hist-chips { display:flex; gap:4px; flex:1; justify-content:center; }
    .hch { border:1.5px solid var(--border); background:var(--bg); color:var(--dim); padding:5px 12px;
      border-radius:7px; font-size:.72rem; font-weight:600; font-family:inherit; cursor:pointer; }
    .hch.active { background:var(--teal-lt); border-color:var(--teal); color:var(--teal); }
    .hist-close { border:none; background:transparent; font-size:1.4rem; color:var(--dim); cursor:pointer;
      width:32px; height:32px; border-radius:6px; flex-shrink:0; }
    .hist-close:hover { background:#F1F5F9; color:#0F172A; }
    .hist-body { flex:1; display:grid; grid-template-rows:1fr auto; gap:0; min-height:0; }
    #hist-map { width:100%; height:100%; min-height:300px; }
    .hist-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:12px 16px;
      border-top:1px solid var(--border); flex-shrink:0; }
    .hstatcard { background:var(--bg); border:1.5px solid var(--border); border-radius:9px;
      padding:6px 10px; text-align:center; }
    .hstatcard .v { font-family:'Share Tech Mono',monospace; font-size:1rem; font-weight:bold; color:var(--teal); }
    .hstatcard .l { font-size:.55rem; color:var(--dim); margin-top:2px; }
    .hist-empty { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      padding:14px 22px; background:rgba(255,255,255,.95); border:1.5px solid var(--border);
      border-radius:10px; font-size:.85rem; color:var(--dim); pointer-events:none; }
    .hist-modal.empty #hist-empty { display:block; }
    .hist-legend { display:flex; align-items:center; gap:6px; padding:6px 16px 10px; font-size:.65rem;
      color:var(--dim); flex-wrap:wrap; border-top:1px dashed var(--border); }
    .lg-chip { color:#fff; padding:1px 7px; border-radius:99px; font-weight:700; font-size:.6rem; }

    /* Stop marker — Phase 5 */
    .stop-marker { background:transparent; border:none; }
    .stop-marker-inner { width:28px; height:28px; border-radius:50%;
      background:#3B82F6; color:#fff; border:2px solid #fff;
      display:flex; align-items:center; justify-content:center;
      font-weight:bold; font-size:14px; font-family:serif;
      box-shadow:0 2px 6px rgba(0,0,0,.25); }

    /* Playback controls — Phase 4.2 */
    .hist-play { display:flex; align-items:center; gap:8px; padding:6px 12px;
      border-top:1px solid var(--border); flex-shrink:0; }
    .play-btn { width:32px; height:32px; border:1.5px solid var(--border); background:var(--bg);
      border-radius:7px; cursor:pointer; font-size:13px; font-family:inherit; color:var(--teal);
      display:flex; align-items:center; justify-content:center; line-height:1; }
    .play-btn:hover:not(:disabled) { background:var(--teal-lt); }
    .play-btn:disabled { opacity:.4; cursor:not-allowed; }
    .play-btn.playing { background:var(--teal); color:#fff; border-color:var(--teal); }
    .play-scrub { flex:1; min-width:0; height:6px; cursor:pointer; accent-color:var(--teal); }
    .play-scrub:disabled { opacity:.4; cursor:not-allowed; }
    .play-time { font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--dim);
      min-width:96px; text-align:right; flex-shrink:0; }
    .play-speeds { display:flex; gap:2px; flex-shrink:0; }
    .psp { border:1.5px solid var(--border); background:var(--bg); padding:3px 7px;
      border-radius:5px; font-size:.62rem; font-weight:700; color:var(--dim); cursor:pointer;
      font-family:inherit; }
    .psp.active { background:var(--teal-lt); color:var(--teal); border-color:var(--teal); }
    .play-marker { background:transparent !important; border:none !important; }
    .play-marker svg { width:100%; height:100%; overflow:visible;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.45)); }
    .play-marker.is-playing svg { animation: driveJiggle .15s linear infinite; }

    @media(max-width:600px) {
      .play-speeds .psp { padding:3px 5px; font-size:.55rem; }
      .play-time { min-width:75px; font-size:.55rem; }
    }

    @media(max-width:600px) {
      .hist-modal { padding:0; }
      .hist-panel { border-radius:0; max-height:100%; }
      .hist-stats { grid-template-columns:repeat(2,1fr); }
      .hist-title { font-size:.85rem; }
    }

    .schips { display: flex; gap: 4px; flex-shrink: 0; }
    .schip  { font-size:.6rem; padding:2px 7px; border-radius:99px; border:1.5px solid; font-weight:600; white-space:nowrap; }
    .schip.skytek       { border-color:#38BDF8; color:#0284C7; background:#F0F9FF; }
    .schip.geniustracks { border-color:#A78BFA; color:#7C3AED; background:#F5F3FF; }
    .schip.legacy       { border-color:#FB923C; color:#EA580C; background:#FFF7ED; }

    #clock { font-family:'Share Tech Mono',monospace; font-size:.72rem; color:var(--dim); flex-shrink:0; }

    @media(max-width:560px) { .schips{display:none} #clock{display:none} }
    @media(max-width:480px) {
      .hstat { padding: 2px 6px; }
      .hstat .v { font-size: .85rem; }
      .hstat .l { font-size: .5rem; }
      .logo-svg { width: 26px; height: 16px; }
      .logo-text { font-size: .5rem; letter-spacing: .7px; }
    }
    @media(max-width:380px) {
      .hstat .l{display:none}
      .hstat{padding:2px 5px}
      .hstat .v { font-size: .78rem; }
      #hdr { padding: 0 8px; gap: 6px; }
      .logo-svg { width: 24px; height: 14px; }
      .logo-text { font-size: .46rem; letter-spacing: .5px; }
    }
    @media(max-width:340px) {
      .hstat{padding:1px 4px}
      .hstat .v { font-size: .7rem; }
      #menu-btn { width: 32px; height: 32px; }
      .rbtn { padding: 3px 7px; font-size: .68rem; }
      .hstats { gap: 3px; }
      .logo-svg { width: 22px; height: 13px; }
      .logo-text { font-size: .42rem; }
    }

    /* ════════════════════════════
       BODY LAYOUT
    ════════════════════════════ */
    #body { position: fixed; inset: var(--hdr) 0 0 0; }

    /* ════════════════════════════
       SIDEBAR — fixed so height is always bounded
    ════════════════════════════ */
    #sidebar {
      position: fixed;
      top: var(--hdr); bottom: 0; left: 0;
      width: var(--sidebar);
      background: var(--surface);
      border-right: 1.5px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
      transition: width .28s ease, transform .28s ease;
      overflow: hidden;
      z-index: 100;
    }

    /* collapsed → mini strip */
    #sidebar.mini {
      width: 48px;
    }
    #sidebar.mini #sb-inner { opacity: 0; pointer-events: none; }
    #sidebar.mini #sb-mini  { display: flex; }

    /* mini strip */
    #sb-mini {
      display: none;
      flex-direction: column; align-items: center;
      padding: 14px 0; gap: 12px;
    }
    .mstat {
      width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid;
      display: flex; align-items: center; justify-content: center;
      font-family:'Share Tech Mono',monospace; font-size:.85rem; font-weight:bold;
      cursor: pointer; transition: transform .15s;
    }
    .mstat:hover { transform: scale(1.1); }
    .mstat.mv { border-color:#86EFAC; color:#16A34A; background:#F0FDF4; }
    .mstat.st { border-color:#FCD34D; color:var(--amber); background:#FFFBEB; }
    .mstat.of { border-color:var(--border); color:var(--gray); background:var(--bg); }

    /* full sidebar content — IS the scroll container itself */
    #sb-inner {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      transition: opacity .2s;
    }
    #sb-inner::-webkit-scrollbar { width: 4px; }
    #sb-inner::-webkit-scrollbar-thumb { background: var(--teal-bd); border-radius: 2px; }

    .rbtn {
      flex-shrink: 0; font-size:.75rem; padding:3px 10px; border-radius:7px;
      border:1.5px solid var(--teal-bd); background:var(--teal-lt);
      color:var(--teal); cursor:pointer; font-family:'Kanit',sans-serif; font-weight:600;
      transition: opacity .15s;
    }
    .rbtn:disabled { opacity: .85; cursor: wait; }

    #refresh-btn {
      position: relative;
      min-width: 40px; height: 24px;
      padding: 0 10px;
    }
    #refresh-btn .r-idle, #refresh-btn .r-busy {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    #refresh-btn .r-busy { display: none; gap: 4px; }
    #refresh-btn .r-busy .dot {
      width: 4px; height: 4px; border-radius: 50%; background: var(--teal);
      animation: dustFloat .9s ease-in-out infinite;
    }
    #refresh-btn .r-busy .dot:nth-child(2){ animation-delay: .15s; background: var(--teal-md); }
    #refresh-btn .r-busy .dot:nth-child(3){ animation-delay: .30s; background: var(--teal-bd); }
    #refresh-btn.busy .r-idle { display: none; }
    #refresh-btn.busy .r-busy { display: flex; }

    #vlist {
      padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }

    /* section header — collapsible */
    .sec-hdr {
      display: flex; align-items: center; gap: 7px;
      font-size: .66rem; font-weight: 700; padding: 7px 5px 3px;
      cursor: pointer; user-select: none; border-radius: 7px;
      transition: background .15s;
    }
    .sec-hdr:hover { background: var(--bg); }
    .sec-hdr .ln  { flex: 1; height: 1.5px; border-radius: 1px; }
    .sec-hdr .arr { font-size: .58rem; transition: transform .25s; }
    .sec-hdr.mv { color:#16A34A; }  .sec-hdr.mv .ln { background:#86EFAC; }
    .sec-hdr.st { color:var(--amber); } .sec-hdr.st .ln { background:#FCD34D; }
    .sec-hdr.of { color:var(--gray); }  .sec-hdr.of .ln { background:var(--border); }

    .sec-body { display:flex; flex-direction:column; gap:4px; overflow:hidden; max-height:9999px; transition:max-height .3s ease; }
    .sec-body.shut { max-height: 0 !important; }

    /* ── vehicle card ── */
    .vcard {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 11px;
      padding: 8px 10px; cursor: pointer; display: flex; gap: 9px; align-items: center;
      transition: box-shadow .15s, border-color .15s;
      animation: slideIn .22s ease;
    }
    .vcard:hover { box-shadow:0 3px 12px rgba(13,148,136,.12); border-color:var(--teal-bd); }
    .vcard.mv { border-left: 4px solid var(--green); }
    .vcard.st { border-left: 4px solid var(--amber); }
    .vcard.of { border-left: 4px solid var(--border); background:var(--bg); opacity:.75; }

    .car-icon { width: 62px; flex-shrink: 0; }
    .vbody    { flex: 1; min-width: 0; }

    .plate { font-family:'Share Tech Mono',monospace; font-size:.9rem; font-weight:bold; letter-spacing:1px; }
    .vcard.mv .plate { color:#15803D; }
    .vcard.of .plate { color:var(--gray); }

    .badge {
      display:inline-block; font-size:.56rem; padding:1px 6px; border-radius:99px;
      font-weight:700; margin-left:5px; vertical-align:middle;
    }
    .vcard.mv .badge { background:#DCFCE7; color:#15803D; border:1px solid #86EFAC; }
    .vcard.st .badge { background:#FEF3C7; color:#92400E; border:1px solid #FCD34D; }
    .vcard.of .badge { background:var(--bg); color:var(--gray); border:1px solid var(--border); }

    .spdrow { display:flex; align-items:center; gap:5px; margin-top:4px; }
    .spdbar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .spdfil { height:100%; border-radius:2px; transition:width .5s; }
    .vcard.mv .spdfil { background:var(--green); }
    .vcard.st .spdfil { background:var(--amber); }
    .spdnum { font-family:'Share Tech Mono',monospace; font-size:.62rem; color:var(--dim); min-width:50px; text-align:right; }

    .addr { font-size:.63rem; color:var(--dim); margin-top:2px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
    .meta { display:flex; gap:5px; align-items:center; margin-top:4px; font-size:.58rem; color:var(--dim); }

    .nav-link {
      display:inline-flex; align-items:center; gap:3px;
      padding:2px 7px; border-radius:6px;
      background:var(--teal-lt); color:var(--teal); border:1px solid var(--teal-bd);
      font-size:.6rem; font-weight:600; text-decoration:none;
    }
    .nav-link:hover { background:var(--teal); color:#fff; }
    .vcard.of .nav-link { background:var(--bg); color:var(--gray); border-color:var(--border); }

    /* provider circular tag */
    .src-tag {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border-radius: 50%;
      font-size: .6rem; font-weight: 700; flex-shrink: 0;
      font-family: 'Share Tech Mono', monospace;
    }
    .src-tag.skytek       { background:#E0F2FE; color:#0284C7; border:1px solid #38BDF8; }
    .src-tag.geniustracks { background:#F5F3FF; color:#7C3AED; border:1px solid #A78BFA; }
    .src-tag.legacy       { background:#FFF7ED; color:#EA580C; border:1px solid #FB923C; }

    /* ════════════════════════════
       MAP — fixed, left edge follows sidebar width
    ════════════════════════════ */
    #mapwrap {
      position: fixed;
      top: var(--hdr); bottom: 0;
      left: var(--sidebar); right: 0;
      overflow: hidden;
      transition: left .28s ease;
    }
    #map     { width: 100%; height: 100%; }

    /* ════════════════════════════
       OVERLAY — อยู่ใน mapwrap ทับแค่แผนที่
       sidebar อยู่นอก mapwrap จึงไม่ถูกทับ
    ════════════════════════════ */
    #overlay {
      display: none;
      position: absolute; inset: 0; z-index: 10;
      background: rgba(0,0,0,.25);
      cursor: pointer;
    }

    /* ════════════════════════════
       MOBILE DRAWER (< 640px)
       sidebar slides in from left as overlay
    ════════════════════════════ */
    @media (max-width: 639px) {
      #sidebar {
        width: 300px !important;
        transform: translateX(-100%);
        z-index: 500;
        box-shadow: 4px 0 24px rgba(0,0,0,.15);
        border-right: none;
      }
      #sidebar.drawer-open { transform: translateX(0); }
      #sidebar.mini        { width: 300px !important; }
      #sb-mini             { display: none !important; }
      #sb-inner {

const _savedView = (() => { try { const s = localStorage.getItem('tidtam_mv'); return s ? JSON.parse(s) : null; } catch{} return null; })();
const map = L.map('map',{zoomControl:false, doubleClickZoom:false}).setView(
  _savedView ? [_savedView.lat, _savedView.lng] : [10.0, 98.6],
  _savedView ? _savedView.z : 9
);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB'}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);
map.on('moveend zoomend', () => {
  try {
    const c = map.getCenter();
    localStorage.setItem('tidtam_mv', JSON.stringify({lat:c.lat, lng:c.lng, z:map.getZoom()}));
  } catch{}
});
// tap-to-zoom: clicking empty map area zooms in one level toward that point (smooth)
map.on('click', e => {
  const z = map.getZoom();
  if(z >= map.getMaxZoom()) return;
  map.flyTo(e.latlng, z+1, {duration:.5});
});

function fitFleet(){
  const pts = Object.values(markers).map(m=>m.getLatLng()).filter(ll=>ll.lat&&ll.lng);
  if(!pts.length) return;
  if(pts.length===1){ map.setView(pts[0],13); return; }
  map.fitBounds(L.latLngBounds(pts),{padding:[40,40]});
}

let userMarker = null;

function addUserMarker(){

      className: 'user-marker',

      iconSize: [18,18], iconAnchor: [9,9]
    }),
    zIndexOffset: 1000
  })
    .bindTooltip('คุณอยู่ที่นี่', {direction:'top', offset:[0,-8]})
    .on('click', () => {
      const z = Math.min(Math.max(map.getZoom()+1, 15), 17);
      map.flyTo([userPos.lat, userPos.lng], z, {duration:.6});
    })
    .addTo(map);
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(
      p => {
        userPos = {lat:p.coords.latitude, lng:p.coords.longitude};
        userMarker.setLatLng([userPos.lat, userPos.lng]);
      },
      null,
      {enableHighAccuracy:true, maximumAge:30000, timeout:10000}
    );
  }
}

function getUserPosOnce(timeoutMs=2500){
  if(!navigator.geolocation) return Promise.resolve(null);
  return new Promise(resolve => {
    const t = setTimeout(()=>resolve(null), timeoutMs);
    navigator.geolocation.getCurrentPosition(
      p => { clearTimeout(t); resolve({lat:p.coords.latitude, lng:p.coords.longitude}); },
      () => { clearTimeout(t); resolve(null); },
      {enableHighAccuracy:false, maximumAge:30000, timeout:2000}
    );
  });
}

// Default view (boot): zoom in on user + N nearest vehicles (by v._km,
// which may be haversine or road distance depending on OSRM state).
function fitUserAndNearby(n=3){
  if(!userPos){ fitFleet(); return; }
  const userLL = [userPos.lat, userPos.lng];
  const nearby = vehicles
    .filter(v => +v.lat && +v.lng && v._km !== undefined && isFinite(v._km))
    .sort((a,b) => a._km - b._km)
    .slice(0, n)
    .map(v => [+v.lat, +v.lng]);
  if(!nearby.length){ map.setView(userLL, 15); return; }
  map.fitBounds(L.latLngBounds([userLL, ...nearby]), {padding:[60,60], maxZoom:15});
}

function gmapsNav(lat,lng){

function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ═══════════════════════════════════════
   ROAD DISTANCE via OSRM (public demo)
   Demo server is rate-limited and "not for production" — fine for our
   scale, but consider self-hosting OSRM or Mapbox if traffic grows.
═══════════════════════════════════════ */
const OSRM_TABLE_URL = 'https://router.project-osrm.org/table/v1/driving';
const _roadDistCache = new Map();
let _osrmInFlight = false;

function _roadCacheKey(u, lat, lng){
  return `${u.lat.toFixed(3)},${u.lng.toFixed(3)}|${lat.toFixed(3)},${lng.toFixed(3)}`;
}

// Fast haversine baseline on v._km so render/filter/group don't have to
// recompute. Idempotent; called before each render that needs distance.
function computeDistances(){
  if(!userPos){ vehicles.forEach(v => { delete v._km; }); return; }
  vehicles.forEach(v => {
    v._km = (+v.lat && +v.lng)
      ? haversine(userPos.lat, userPos.lng, +v.lat, +v.lng)
      : Infinity;
  });
}

// Upgrade v._km from straight-line to OSRM driving distance. One batch
// /table call covers the whole fleet; rounded (lat,lng) pairs are
// cached so subsequent refreshes only fetch vehicles that moved.
async function upgradeToRoadDistances(){
  if(!userPos || _osrmInFlight) return false;
  const valid = vehicles.filter(v => +v.lat && +v.lng);
  if(!valid.length) return false;

  const uncached = [];
  for(const v of valid){
    const k = _roadCacheKey(userPos, +v.lat, +v.lng);
    if(_roadDistCache.has(k)) v._km = _roadDistCache.get(k);
    else uncached.push(v);
  }
  if(!uncached.length) return true;

  _osrmInFlight = true;
  try {
    const coords = [
      `${userPos.lng},${userPos.lat}`,
      ...uncached.map(v => `${+v.lng},${+v.lat}`)
    ].join(';');
    const dests = uncached.map((_, i) => i + 1).join(';');
    const url = `${OSRM_TABLE_URL}/${coords}?sources=0&destinations=${dests}&annotations=distance`;
    const r = await fetch(url);
    if(!r.ok) return false;
    const j = await r.json();
    const ds = j.distances && j.distances[0];
    if(!ds) return false;
    uncached.forEach((v, i) => {
      const m = ds[i];
      if(m != null){
        const km = m / 1000;
        v._km = km;
        _roadDistCache.set(_roadCacheKey(userPos, +v.lat, +v.lng), km);
      }
      // m == null → no route → keep haversine fallback
    });
    return true;
  } catch(e){
    console.warn('OSRM road distance fetch failed:', e.message);
    return false;
  } finally {
    _osrmInFlight = false;
  }
}

function fmtAddr(addr, opts={}){
  const {inline=false, prefix=''} = opts;
  if(!addr) return '';
  const parts = addr.split('\n');

  if(inline){
    return admin
      ? `${prefix}<b>${poi}</b><br><span style="color:#64748B;font-size:11px;padding-left:14px">${admin}</span>`
      : `${prefix}${poi}`;
  }
  return admin
    ? `<div style="font-size:12px;color:#334155;font-weight:500;margin:3px 0 1px">${poi}</div>
       <div style="font-size:11px;color:#64748B;margin-bottom:3px">${admin}</div>`
    : `<div style="font-size:11px;color:#64748B;margin:3px 0">${poi}</div>`;
}

// Update popup HTML in place so v._km changes (haversine → road distance)
// flow through to open popups without re-creating markers (which would
// close any popup the user has open).
function refreshMarkerPopups(){
  for(const v of vehicles){
    const key = `${v.source}_${v.vehicle_id}`;
    if(markers[key]) markers[key].setPopupContent(popupHTML(v));

function renderMarkers(list){
  Object.values(markers).forEach(m=>map.removeLayer(m));

  list.forEach(v=>{

/* ═══════════════════════════════════════
   CARD
═══════════════════════════════════════ */
const SRC_LABEL = {skytek:'S', geniustracks:'G', legacy:'L'};

function toThaiTime(iso){
  // Localhost SQLite stores Bangkok-naive ISO (datetime.now() on a Bangkok box).
  // Do NOT append 'Z' — that would treat it as UTC and shift +7h. The web file
  // does append 'Z' because it reads UTC-naive rows written by GHA.
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}

// Minutes since updated_at. Uses the same time-handling rule as toThaiTime
// (Bangkok-naive on localhost — no 'Z' appended).
function vehicleAgeMin(iso){
  if(!iso) return Infinity;
  const d = new Date(iso);
  if(isNaN(d)) return Infinity;
  return (Date.now() - d.getTime()) / 60000;
}

// Returns array of {type, sev, msg} for a vehicle's current state.
// sev: 'warn' | 'crit'. Empty array means no alerts.
function computeAlerts(v){
  const out = [];
  const spd = +v.speed || 0;
  if(spd > 120)      out.push({type:'speed', sev:'crit', msg:`ขับเร็ว ${Math.round(spd)} km/h`});
  else if(spd > 90)  out.push({type:'speed', sev:'warn', msg:`ขับเร็ว ${Math.round(spd)} km/h`});
  // Thai law: trucks may not drive > 4 hours continuously. Provider-flagged.
  // extra may arrive as a JSON string (Supabase TEXT column) or as an object
  // (FastAPI deserializes server-side) — handle both.
  let extra = v.extra;
  if (typeof extra === 'string') {
    try { extra = JSON.parse(extra); } catch { extra = null; }
  }
  if (extra && extra.over_4h === true) {
    out.push({type:'over4h', sev:'crit', msg:'⏰ ขับเกิน 4 ชม. (พรบ.ขนส่ง)'});
  }
  // Stale-data alert only for vehicles the provider still treats as online —
  // OFFLINE rows are already surfaced in the ออฟไลน์ filter.
  if(cls(v) !== 'of'){
    const age = vehicleAgeMin(v.updated_at);
    if(age > 120)     out.push({type:'stale', sev:'crit', msg:`ไม่อัปเดต ${(age/60).toFixed(1)} ชม.`});
    else if(age > 30) out.push({type:'stale', sev:'warn', msg:`ไม่อัปเดต ${Math.round(age)} นาที`});
  }
  return out;
}

function alertSeverity(alerts){
  if(alerts.some(a=>a.sev==='crit')) return 'crit';
  if(alerts.length) return 'warn';
  return null;
}

function cardHTML(v){
  const c=cls(v), spd=+v.speed||0, pct=Math.min(spd/120*100,100);
  const key=`${v.source}_${v.vehicle_id}`;
  const badge=c==='mv'?`${spd} km/h`:c==='of'?'OFFLINE':'จอด';
  const addr=(v.address||'').trim();
  const time=toThaiTime(v.updated_at);
  const tag=`<span class="src-tag ${v.source}">${SRC_LABEL[v.source]||'?'}</span>`;
  const alerts = computeAlerts(v);
  const aSev   = alertSeverity(alerts);
  const alertPill = aSev
    ? `<span class="alert-pill ${aSev}" title="${alerts.map(a=>a.msg).join(' · ')}">⚠️ ${alerts.length}</span>`
    : '';
  const navable = +v.lat && +v.lng;
  const navHTML = navable
    ? `<a class="nav-link" href="${gmapsNav(v.lat,v.lng)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="นำทางด้วย Google Maps">🧭 นำทาง</a>`
    : '';
  const km = v._km;
  const distHTML = (km !== undefined && isFinite(km))
    ? `<span style="color:var(--teal);font-size:.58rem;font-weight:700">${km<1?Math.round(km*1000)+' ม.':km.toFixed(1)+' กม.'}</span>`
    : '';
  return `<div class="vcard ${c}${aSev?' has-alert':''}" onclick="focusV('${key}')">
    <div class="car-icon">${SVG[c]()}</div>
    <div class="vbody">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
        <div class="plate">${v.plate||v.vehicle_id}<span class="badge">${badge}</span>${alertPill}</div>
        ${tag}
      </div>
      ${addr?`<div class="addr">📍 ${addr}</div>`:'<div class="addr" style="color:#CBD5E1">ไม่มีข้อมูลที่อยู่</div>'}
      <div class="spdrow">
        <div class="spdbar"><div class="spdfil" style="width:${pct}%"></div></div>
        <div class="spdnum">${spd} km/h</div>
      </div>
      <div class="meta">
        ${navHTML}
        ${distHTML}
        ${time?`<span style="margin-left:auto">🕐 ${time}</span>`:'<span style="margin-left:auto"></span>'}
      </div>
    </div>
  </div>`;
}

   GROUP MODE TOGGLE
═══════════════════════════════════════ */
function setGroupMode(mode){
  groupMode = mode;
  document.getElementById('gm-status').classList.toggle('active', mode==='status');
  document.getElementById('gm-location').classList.toggle('active', mode==='location');
  if(mode==='location' && !userPos){
    navigator.geolocation.getCurrentPosition(
      p => {
        userPos={lat:p.coords.latitude, lng:p.coords.longitude};
        addUserMarker();
        computeDistances();                 // first time computing for these vehicles
        updateStats(vehicles);
        renderSidebar(vehicles);
        fitUserAndNearby();
        upgradeToRoadDistances().then(ok => {
          if (ok) { refreshMarkerPopups(); renderSidebar(vehicles); updateStats(vehicles); }
        });
      },
      () => { groupMode='status'; setGroupMode('status'); }
    );
  } else if(mode==='location' && userPos){
    // Re-snap map whenever user (re)picks location mode
    fitUserAndNearby();
  }
  renderSidebar(vehicles);
}

═══════════════════════════════════════ */
function renderSidebarByLocation(list){
  const shown = applyFilter(list);
  if(!userPos){
    document.getElementById('vlist').innerHTML=
      '<div style="padding:28px 16px;text-align:center;color:var(--dim);font-size:.82rem">กำลังขอตำแหน่ง GPS…</div>';
    return;
  }
  // v._km is computed by computeDistances() / upgradeToRoadDistances() on
  // the source vehicles array, so we just sort+group here.
  const withDist = shown.slice().sort((a,b)=>(a._km ?? Infinity)-(b._km ?? Infinity));
  const locGroups=[
    {key:'ln',cls:'mv',label:'📍 ใกล้ฉัน',sub:'< 5 กม.',  list:withDist.filter(v=>v._km<5)},
    {key:'lm',cls:'mv',label:'🗺 ในพื้นที่',sub:'5–50 กม.',list:withDist.filter(v=>v._km>=5&&v._km<50)},
    {key:'lf',cls:'st',label:'🌏 ไกล',     sub:'> 50 กม.',list:withDist.filter(v=>v._km>=50)},
  ];
  document.getElementById('vlist').innerHTML = locGroups.map(g=>{
    if(!g.list.length) return '';
    if(secOpen[g.key]===undefined) secOpen[g.key] = true;
    const open=secOpen[g.key];
    return `<div class="sec-hdr ${g.cls}" onclick="toggleSec('${g.key}')">
      <span>${g.label} <small style="font-weight:400;opacity:.65">${g.sub}</small> (${g.list.length})</span>
      <div class="ln"></div>
      <span class="arr" id="ar-${g.key}">${open?'▼':'▶'}</span>
    </div>
    <div class="sec-body ${open?'':'shut'}" id="sb-${g.key}">
      ${g.list.map(v=>cardHTML(v)).join('')}
    </div>`;
  }).join('');
}

function renderSidebar(list){
  if(groupMode==='location'){ renderSidebarByLocation(list); return; }
  const shown = applyFilter(list);
  const groups = { mv: shown.filter(v=>cls(v)==='mv'), st: shown.filter(v=>cls(v)==='st'), of: shown.filter(v=>cls(v)==='of') };
  const labels  = { mv:['▶','วิ่งอยู่'], st:['■','จอด'], of:['○','ออฟไลน์'] };

  document.getElementById('vlist').innerHTML = ['mv','st','of'].map(k=>{
    const g=groups[k]; if(!g.length) return '';
    const open=secOpen[k];
    return `<div class="sec-hdr ${k}" onclick="toggleSec('${k}')">
      <span>${labels[k][0]} ${labels[k][1]} (${g.length})</span>
      <div class="ln"></div>
      <span class="arr" id="ar-${k}">${open?'▼':'▶'}</span>
    </div>
    <div class="sec-body ${open?'':'shut'}" id="sb-${k}">
      ${g.map(cardHTML).join('')}
    </div>`;
  }).join('');
}

function focusV(k){
  if(markers[k]){ map.setView(markers[k].getLatLng(),14); markers[k].openPopup(); }
  if(isMobile()) closeSidebar();
}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
// Location-first filter: near = online ≤50km, far = online >50km, off = offline.
// If no userPos, near/far return [] (counts show 0 to nudge GPS opt-in).
function applyFilter(list){
  if(filter==='all') return list;
  if(filter==='off') return list.filter(v=>cls(v)==='of');
  if(filter==='alerts') return list.filter(v=>computeAlerts(v).length > 0);
  if(!userPos) return [];
  return list.filter(v => {
    if(cls(v)==='of') return false;
    if(v._km === undefined || !isFinite(v._km)) return false;
    return filter==='near' ? v._km <= 50 : v._km > 50;
  });
}

function updateStats(list){
  const offCount = list.filter(v=>cls(v)==='of').length;
  let nearCount = 0, farCount = 0;
  if(userPos){
    for(const v of list){
      if(cls(v)==='of') continue;
      if(v._km === undefined || !isFinite(v._km)) continue;
      if(v._km <= 50) nearCount++; else farCount++;
    }
  }
  let alertCount = 0, critAlerts = 0;
  for(const v of list){
    const a = computeAlerts(v);
    if(a.length){ alertCount++; if(a.some(x=>x.sev==='crit')) critAlerts++; }
  }
  const bs=s=>list.filter(v=>v.source===s).length;
  document.getElementById('s-t').textContent=list.length;
  document.getElementById('s-n').textContent=nearCount;
  document.getElementById('s-f').textContent=farCount;
  document.getElementById('s-o').textContent=offCount;
  const sa = document.getElementById('s-a');
  sa.textContent = alertCount;
  // Pulse the alert card when there's at least one critical alert

/* ═══════════════════════════════════════
   PULL-TO-REFRESH (sidebar)
═══════════════════════════════════════ */
function initPullToRefresh(){
  const el  = document.getElementById('sb-inner');
  const ind = document.getElementById('pull-ind');
  const THRESHOLD = 55;
  let startY=0, pulling=false;

  el.addEventListener('touchstart', e=>{
    startY = e.touches[0].clientY;
    pulling = el.scrollTop === 0;
  }, {passive:true});

  el.addEventListener('touchmove', e=>{
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy <= 0){ pulling=false; return; }
    const pull = Math.min(dy * 0.52, THRESHOLD + 12);
    el.style.transform  = `translateY(${pull}px)`;
    ind.style.height    = pull + 'px';
    ind.textContent     = pull >= THRESHOLD ? '↑ ปล่อยเพื่อรีเฟรช' : '↓ ดึงเพื่อรีเฟรช';
  }, {passive:true});

  const snap = () => {
    if(!pulling) return;
    const pull = parseFloat(el.style.transform.match(/[\d.]+/)?.[0] || '0');
    pulling = false;
    el.style.transition  = 'transform .25s ease';
    el.style.transform   = 'translateY(0)';
    ind.style.height     = '0';
    setTimeout(()=>{ el.style.transition=''; }, 260);
    if(pull >= THRESHOLD) refreshLocal();
  };
  el.addEventListener('touchend',    snap, {passive:true});
  el.addEventListener('touchcancel', snap, {passive:true});
}

// Speed → color scale used for both segments and point markers.
function speedColor(spd){
  if(spd > 90) return '#DC2626';      // red — over 90 km/h
  if(spd > 60) return '#F97316';      // orange
  if(spd > 30) return '#EAB308';      // yellow
  return '#16A34A';                   // green — slow / stopped
}

// OSRM /route — returns [[lat,lng], ...] road geometry between two points,
// or null to signal "use straight line". Caches by rounded coords (~11m).
const _routeCache = new Map();
const _OSRM_BASE = 'https://router.project-osrm.org/route/v1/driving';
async function osrmRoute(a, b){
  // Skip routing for cross-region jumps — likely scrape gap, not a real trip
  const km = haversine(+a.lat, +a.lng, +b.lat, +b.lng);
  if(km > 200) return null;
  const key = `${(+a.lat).toFixed(4)},${(+a.lng).toFixed(4)}→${(+b.lat).toFixed(4)},${(+b.lng).toFixed(4)}`;
  if(_routeCache.has(key)) return _routeCache.get(key);
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    const url = `${_OSRM_BASE}/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(timer);
    if(!r.ok) return null;
    const data = await r.json();
    if(data.code !== 'Ok' || !data.routes || !data.routes[0]) return null;
    const latlngs = data.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]);
    _routeCache.set(key, latlngs);
    return latlngs;
  } catch(e){
    return null;  // timeout, network error, etc. → caller falls back to straight line
  }
}

// Parse recorded_at to ms-since-epoch. Local SQLite stores Bangkok-naive
// timestamps — just parse as-is. (Web file overrides this for UTC-naive Supabase.)
function parseHistStamp(iso){
  return new Date(iso).getTime();
}

function histPointHTML(p){
  const t = new Date(p.recorded_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  const d = new Date(p.recorded_at).toLocaleDateString('th-TH',{month:'short',day:'numeric'});
  const spd = Math.round(+p.speed || 0);
  const addr = (p.address || '').trim();
  return `<div style="font-size:12px;line-height:1.5;max-width:220px">
    <b>${d} · ${t}</b>
    ${addr ? `<br>📍 ${addr}` : ''}
    <br>🏎️ ${spd} km/h · ${p.status || '—'}
  </div>`;
}

// Per-pair classifier — degrades gracefully as fields drop out.
// Level 1 (engine or odometer): distinguishes Parked / Idling / Moving
// Level 2 (speed only):         same three, lower confidence
// Level 3 (position only):      just Parked / Moving by 50m gate
// Idling and Parked both keep a cluster alive — a vehicle that briefly
// fires up the engine in the same spot is still one Park.
function classifyPair(prev, curr){
  const STOP_RADIUS_M = 50;
  const ODO_DELTA_KM = 0.1;
  const distM = haversine(+prev.lat, +prev.lng, +curr.lat, +curr.lng) * 1000;
  const eK = v => v === 0 || v === 1 || v === false || v === true;
  const eOff = v => v === 0 || v === false;
  const engineKnown = eK(curr.engine_on) || eK(prev.engine_on);
  const engineOff = engineKnown && eOff(eK(curr.engine_on) ? curr.engine_on : prev.engine_on);
  const odoKnown = prev.odometer != null && curr.odometer != null;
  const odoUnchanged = odoKnown && Math.abs(+curr.odometer - +prev.odometer) <= ODO_DELTA_KM;

  if(engineKnown || odoKnown){
    if(distM > STOP_RADIUS_M) return 'Moving';
    const stationary = engineKnown ? engineOff : odoUnchanged;
    return stationary ? 'Parked' : 'Idling';
  }
  if(curr.speed != null){
    if(distM > STOP_RADIUS_M) return 'Moving';
    return (+curr.speed || 0) === 0 ? 'Parked' : 'Idling';
  }
  return distM <= STOP_RADIUS_M ? 'Parked' : 'Moving';
}

// Park = consecutive non-Moving pairs spanning ≥15 min wall time.
function detectStops(positions){
  const MIN_DURATION_MIN = 15;
  if(positions.length < 2) return [];
  const stops = [];
  let cluster = null;
  const finalize = c => {
    const t0 = parseHistStamp(c[0].recorded_at);
    const t1 = parseHistStamp(c[c.length-1].recorded_at);
    const minutes = (t1 - t0) / 60000;
    if(minutes < MIN_DURATION_MIN || c.length < 2) return null;
    const lat = c.reduce((s,p)=>s+ +p.lat,0)/c.length;
    const lng = c.reduce((s,p)=>s+ +p.lng,0)/c.length;
    return {lat, lng, start:c[0].recorded_at, end:c[c.length-1].recorded_at,
      duration:minutes, address:c[0].address||'', points:c};
  };
  for(let i = 0; i < positions.length - 1; i++){
    const state = classifyPair(positions[i], positions[i+1]);
    if(state === 'Moving'){
      if(cluster){ const s = finalize(cluster); if(s) stops.push(s); cluster = null; }
    } else {
      if(!cluster) cluster = [positions[i]];
      cluster.push(positions[i+1]);
    }
  }
  if(cluster){ const s = finalize(cluster); if(s) stops.push(s); }
  return stops;
}

function stopMarkerHTML(stop){
  const fmtTime = iso => new Date(parseHistStamp(iso)).toLocaleString('th-TH',
    {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const fmtDur = m => m < 60 ? `${Math.round(m)} นาที` : `${(m/60).toFixed(1)} ชม.`;
  return `<div style="font-size:12px;line-height:1.5;max-width:240px">
    <b>🅿️ จุดจอด</b>
    ${stop.address ? `<br>${fmtAddr(stop.address, {inline:true, prefix:'📍 '})}` : ''}
    <br>⏱️ จอด <b>${fmtDur(stop.duration)}</b>

  </div>`;
}

let _histPoints = null;
let _playState = null;
let _routedSegments = null;          // parallel to _histPoints pairs: route latlngs[] or null (fallback)
let _playPath = null;                // densified timeline {lat,lng,time}[] for road-following playback
const _PLAYBACK_TARGET_SEC = 30;     // 1x = trip plays in this many seconds, regardless of trip length

// Truck marker used for replay — same logo as the app header (minus the

const TRUCK_SVG = `<svg viewBox="0 0 140 82" xmlns="http://www.w3.org/2000/svg">

// Effective timeline for playback: dense road path if built, else sparse samples.
// Each point exposes .lat/.lng. _playPath rows carry .time; sample rows use .recorded_at.
function _playTimeline(){ return _playPath || _histPoints; }
function _pointTime(p){ return p.time !== undefined ? p.time : parseHistStamp(p.recorded_at); }

function _tripDurationSec(){
  const tl = _playTimeline();
  if(!tl || tl.length < 2) return 0;
  return Math.max(0, (_pointTime(tl[tl.length-1]) - _pointTime(tl[0])) / 1000);
}

// Where would the vehicle be at playbackSec into the trip? Linear lerp between
// adjacent timeline points — which become road-dense after _playPath is built,
// so the truck follows U-turns and curves instead of cutting across.
function _positionAt(playbackSec){
  const tl = _playTimeline();
  if(!tl || tl.length === 0) return {lat:0, lng:0, time:Date.now()};
  const t0 = _pointTime(tl[0]);
  const dur = (_pointTime(tl[tl.length-1]) - t0) / 1000;
  if(dur <= 0) return {lat:+tl[0].lat, lng:+tl[0].lng, time:t0};
  const targetMs = t0 + Math.max(0, Math.min(dur, playbackSec)) * 1000;
  let i = 0;
  while(i < tl.length - 1 && _pointTime(tl[i+1]) <= targetMs) i++;
  if(i >= tl.length - 1){
    const last = tl[tl.length-1];
    return {lat:+last.lat, lng:+last.lng, time:targetMs};
  }
  const a = tl[i], b = tl[i+1];
  const ta = _pointTime(a), tb = _pointTime(b);
  const f = (tb === ta) ? 0 : (targetMs - ta) / (tb - ta);
  return {
    lat: +a.lat + (+b.lat - +a.lat) * f,
    lng: +a.lng + (+b.lng - +a.lng) * f,
    time: targetMs,
  };
}

// Build the dense playback timeline from sample pairs + cached OSRM routes.
// Each route's points get a timestamp interpolated by cumulative distance
// along the route, so the truck spends more wall-time on long segments.
function _buildPlayPath(){
  if(!_histPoints || _histPoints.length < 2 || !_routedSegments) return null;
  const path = [];
  for(let i = 1; i < _histPoints.length; i++){
    const a = _histPoints[i-1], b = _histPoints[i];
    const timeA = parseHistStamp(a.recorded_at);
    const timeB = parseHistStamp(b.recorded_at);
    const route = _routedSegments[i-1];
    if(!route || route.length < 2){
      if(i === 1) path.push({lat:+a.lat, lng:+a.lng, time:timeA});
      path.push({lat:+b.lat, lng:+b.lng, time:timeB});
      continue;
    }
    // Cumulative distance along the route
    let total = 0;
    const cum = [0];
    for(let j = 1; j < route.length; j++){
      total += haversine(route[j-1][0], route[j-1][1], route[j][0], route[j][1]);
      cum.push(total);
    }
    for(let j = 0; j < route.length; j++){
      if(i > 1 && j === 0) continue;             // dedupe with previous segment's last point
      const ratio = total > 0 ? cum[j] / total : 0;
      const time = timeA + (timeB - timeA) * ratio;
      path.push({lat:route[j][0], lng:route[j][1], time});
    }
  }
  return path.length >= 2 ? path : null;
}

function _formatPlayTime(ms){
  return new Date(ms).toLocaleString('th-TH',
    {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'});
}

function _updatePlayMarker(playbackSec){
  if(!_playState || !_playState.marker) return;
  const pos = _positionAt(playbackSec);
  _playState.marker.setLatLng([pos.lat, pos.lng]);
  const dur = _tripDurationSec();
  if(dur > 0){
    document.getElementById('play-scrub').value = Math.round((playbackSec / dur) * 1000);
  }
  document.getElementById('play-time').textContent = _formatPlayTime(pos.time);
}

function _resetPlayUI(enabled){
  const btn = document.getElementById('play-btn');
  const scrub = document.getElementById('play-scrub');
  btn.disabled = !enabled;
  scrub.disabled = !enabled;
  btn.classList.remove('playing');
  btn.textContent = '▶';
  scrub.value = 0;
  document.getElementById('play-time').textContent = enabled ? '—' : '—';
}

function _ensurePlayState(){
  if(_playState) return;
  const active = document.querySelector('.psp.active');
  _playState = {
    playing: false,
    playbackSec: 0,
    speedFactor: active ? +active.dataset.s : 1,
    marker: null,
    raf: null,
    lastMs: 0,
  };
}

function _ensurePlayMarker(){
  _ensurePlayState();
  if(_playState.marker) return;
  const pos = _positionAt(_playState.playbackSec);
  _playState.marker = L.marker([pos.lat, pos.lng], {
    icon: L.divIcon({className:'play-marker',
      html: TRUCK_SVG,
      iconSize:[56,33], iconAnchor:[28,17]}),     // 140:82 aspect, centered
    zIndexOffset: 1000,
  }).addTo(histMap);
}

function togglePlayback(){
  if(!_histPoints || _histPoints.length < 2) return;
  if(_playState && _playState.playing){ _pausePlayback(); }
  else { _startOrResume(); }
}

function _startOrResume(){
  _ensurePlayMarker();
  // If at end, restart
  if(_playState.playbackSec >= _tripDurationSec()) _playState.playbackSec = 0;
  _playState.playing = true;
  _playState.lastMs = performance.now();
  const btn = document.getElementById('play-btn');
  btn.textContent = '⏸';
  btn.classList.add('playing');
  const el = _playState.marker && _playState.marker.getElement();
  if(el) el.classList.add('is-playing');
  _playTick();
}

function _pausePlayback(){
  if(!_playState) return;
  _playState.playing = false;
  if(_playState.raf){ cancelAnimationFrame(_playState.raf); _playState.raf = null; }
  const btn = document.getElementById('play-btn');
  btn.textContent = '▶';
  btn.classList.remove('playing');
  const el = _playState.marker && _playState.marker.getElement();
  if(el) el.classList.remove('is-playing');
}

function stopPlayback(){
  if(!_playState) return;
  if(_playState.raf) cancelAnimationFrame(_playState.raf);
  if(_playState.marker) histMap.removeLayer(_playState.marker);
  _playState = null;
  const btn = document.getElementById('play-btn');
  btn.textContent = '▶';
  btn.classList.remove('playing');
  document.getElementById('play-scrub').value = 0;
  document.getElementById('play-time').textContent = '—';
}

function _playTick(){
  if(!_playState || !_playState.playing) return;
  const now = performance.now();
  const dtSec = (now - _playState.lastMs) / 1000;
  _playState.lastMs = now;
  const speedMult = (_tripDurationSec() / _PLAYBACK_TARGET_SEC) * _playState.speedFactor;
  _playState.playbackSec += dtSec * speedMult;
  const dur = _tripDurationSec();
  if(_playState.playbackSec >= dur){
    _playState.playbackSec = dur;
    _updatePlayMarker(dur);
    _pausePlayback();
    return;
  }
  _updatePlayMarker(_playState.playbackSec);
  _playState.raf = requestAnimationFrame(_playTick);
}

function seekPlayback(frac){
  if(!_histPoints || _histPoints.length < 2) return;
  _ensurePlayMarker();
  _pausePlayback();
  _playState.playbackSec = Math.max(0, Math.min(1, +frac)) * _tripDurationSec();
  _updatePlayMarker(_playState.playbackSec);
}

function setPlaybackSpeed(mult){
  document.querySelectorAll('.psp').forEach(b => b.classList.toggle('active', +b.dataset.s === mult));
  if(_playState) _playState.speedFactor = mult;
}

// Tracks the most recent loadHistory invocation so a stale OSRM batch
// (older time-window pick) won't draw segments onto the current view.
let _histLoadToken = 0;

async function loadHistory(hours){
  setActiveChip(hours);
  if(!histTarget) return;
  stopPlayback();                                  // cleanup any previous run
  _routedSegments = null;
  _playPath = null;
  const token = ++_histLoadToken;
  const pts = await fetchPositions(histTarget.source, histTarget.vehicle_id, hours);
  if(token !== _histLoadToken) return;
  histLayers.forEach(l => histMap.removeLayer(l));
  histLayers = [];
  updateHistoryStats(pts);
  const modal = document.getElementById('hist-modal');
  modal.classList.toggle('empty', pts.length === 0);
  if(!pts.length){ _histPoints = null; _resetPlayUI(false); return; }
  const valid = pts.filter(p => +p.lat && +p.lng);
  if(!valid.length){ _histPoints = null; _resetPlayUI(false); return; }
  _histPoints = valid;
  _routedSegments = new Array(valid.length - 1).fill(null);
  _resetPlayUI(valid.length >= 2);
  // Detect stops: stationary clusters spanning ≥15 min — see detectStops().
  // Interior points of a stop are hidden — replaced by one 🅿️ marker. Start/end of the trip stay visible.
  const stops = detectStops(valid);
  const stopIdx = new Set();
  stops.forEach(stop => stop.points.forEach(p => {
    const i = valid.indexOf(p);
    if(i >= 0) stopIdx.add(i);
  }));
  // Markers first — instant feedback while road routes are fetched.
  valid.forEach((p, i) => {
    const isStart = i === 0, isEnd = i === valid.length - 1;
    if(stopIdx.has(i) && !isStart && !isEnd) return;     // hide — covered by 🅿️ marker
    const r = (isStart || isEnd) ? 7 : 4;
    const m = L.circleMarker([+p.lat, +p.lng], {
      radius: r,
      color: '#fff',
      weight: isStart || isEnd ? 2 : 1,
      fillColor: isStart ? '#16A34A' : isEnd ? '#DC2626' : speedColor(+p.speed||0),
      fillOpacity: 1,
    }).addTo(histMap).bindPopup(histPointHTML(p));
    histLayers.push(m);
  });
  // Stop markers
  const stopIcon = L.divIcon({className:'stop-marker',
    html:'<div class="stop-marker-inner">P</div>',
    iconSize:[28,28], iconAnchor:[14,14]});
  stops.forEach(stop => {
    const m = L.marker([stop.lat, stop.lng], {icon: stopIcon})
      .addTo(histMap).bindPopup(stopMarkerHTML(stop));
    histLayers.push(m);
  });
  // Fit to sample points — road geometry will sit inside this bound.
  histMap.fitBounds(L.latLngBounds(valid.map(p => [+p.lat, +p.lng])), {padding:[24,24], maxZoom:14});
  setTimeout(()=>histMap.invalidateSize(), 60);
  // Road-following segments: OSRM /route per pair, fall back to straight line.
  for(let i = 1; i < valid.length; i++){
    if(token !== _histLoadToken) return;     // user changed chip mid-fetch
    const a = valid[i-1], b = valid[i];
    const avgSpd = ((+a.speed||0) + (+b.speed||0)) / 2;
    const roadPts = await osrmRoute(a, b);
    if(token !== _histLoadToken) return;
    _routedSegments[i-1] = roadPts;
    const segPts = roadPts || [[+a.lat,+a.lng],[+b.lat,+b.lng]];
    // Dashed faded style flags fallback segments so the difference is visible.
    const opts = roadPts
      ? {color: speedColor(avgSpd), weight:4, opacity:.85}
      : {color: speedColor(avgSpd), weight:3, opacity:.5, dashArray:'6,8'};
    const seg = L.polyline(segPts, opts).addTo(histMap);
    histLayers.push(seg);
  }
  // All routes resolved → build dense timeline so PLAY follows the road
  // (including U-turns). If playback is already underway, the next tick
  // will pick up _playPath automatically — playbackSec is timeline-agnostic.
  if(token === _histLoadToken) _playPath = _buildPlayPath();
}

function updateHistoryStats(pts){
  const fmtDist = km => km < 1 ? `${Math.round(km*1000)} ม.` : `${km.toFixed(1)} กม.`;
  if(!pts.length){
    ['hs-dist','hs-maxspd','hs-points','hs-range'].forEach(id => document.getElementById(id).textContent = '—');
    document.getElementById('hs-points').textContent = '0';
    return;
  }
  let dist = 0, maxSpd = 0;
  for(let i = 1; i < pts.length; i++){
    dist += haversine(+pts[i-1].lat, +pts[i-1].lng, +pts[i].lat, +pts[i].lng);
  }
  for(const p of pts) maxSpd = Math.max(maxSpd, +p.speed || 0);
  // Parse timestamps using the same convention as vehicleAgeMin in this file
  const t0 = new Date(pts[0].recorded_at).getTime();
  const t1 = new Date(pts[pts.length-1].recorded_at).getTime();
  const hrs = (t1 - t0) / 3600000;
  document.getElementById('hs-dist').textContent = fmtDist(dist);
  document.getElementById('hs-maxspd').textContent = `${Math.round(maxSpd)} km/h`;
  document.getElementById('hs-points').textContent = pts.length;
  document.getElementById('hs-range').textContent = hrs < 1 ? `${Math.round(hrs*60)} นาที` : `${hrs.toFixed(1)} ชม.`;
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && document.getElementById('hist-modal').style.display === 'flex'){
    closeHistory();
  }
});
</script>
