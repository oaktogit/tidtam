name: Scrape GPS Data

on:
  schedule:
    - cron: '0 */2 * * *'   # ทุก 2 ชั่วโมง
  workflow_dispatch:          # กด Run manually ได้จาก GitHub UI / dashboard

# กัน trigger ซ้อน: ถ้ารันอยู่แล้ว trigger ใหม่จะรอ ไม่ใช่รันพร้อมกัน
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pip show playwright | awk '/^Version: /{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers (cache miss → full)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright OS deps only (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run scraper
        run: python scrape.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SKYTEK_USERNAME: ${{ secrets.SKYTEK_USERNAME }}
          SKYTEK_PASSWORD: ${{ secrets.SKYTEK_PASSWORD }}
          GENIUSTRACKS_USERNAME: ${{ secrets.GENIUSTRACKS_USERNAME }}
          GENIUSTRACKS_PASSWORD: ${{ secrets.GENIUSTRACKS_PASSWORD }}
          LEGACY_ACCOUNT: ${{ secrets.LEGACY_ACCOUNT }}
          LEGACY_USERNAME: ${{ secrets.LEGACY_USERNAME }}
          LEGACY_PASSWORD: ${{ secrets.LEGACY_PASSWORD }}
