<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>เข้าสู่ระบบ — Tidtam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Share+Tech+Mono&display=swap');
    :root {
      --teal: #0D9488; --teal-md: #14B8A6; --teal-lt: #CCFBF1; --teal-bd: #99F6E4;
      --salmon: #F43F5E; --bg: #F0FDFA; --surface: #FFFFFF; --border: #E2E8F0;
      --text: #134E4A; --dim: #64748B;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text);
      padding: 20px;
    }
    .card {
      background: var(--surface); border: 1.5px solid var(--teal-bd);
      border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 380px;
      box-shadow: 0 10px 40px rgba(13,148,136,.12);
    }
    .logo { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; margin-bottom: 6px; }
    .logo-svg { width: 84px; height: 50px; flex-shrink: 0; overflow: visible; }
    .logo-text { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; line-height: 1; font-family: 'Kanit', sans-serif; }
    .logo-text .lg { color: var(--teal); }
    .logo-text .lp { color: var(--salmon); }

    /* truck animations */
    @keyframes puffOut    { 0%{opacity:.75;transform:translate(0,0)scale(.6)} 100%{opacity:0;transform:translate(-22px,-4px)scale(1.6)} }
    @keyframes spdFlick   { 0%,100%{opacity:.7;transform:scaleX(1)} 50%{opacity:.2;transform:scaleX(.6)} }
    @keyframes driveJiggle { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1px,.6px)} 50%{transform:translate(0,-.8px)} 75%{transform:translate(1px,.6px)} }
    .puff1{animation:puffOut 1.1s ease-out 0s   infinite}
    .puff2{animation:puffOut 1.1s ease-out .37s infinite}
    .puff3{animation:puffOut 1.1s ease-out .74s infinite}
    .spd1{animation:spdFlick .6s ease-in-out 0s   infinite;transform-origin:right center}
    .spd2{animation:spdFlick .6s ease-in-out .2s  infinite;transform-origin:right center}
    .spd3{animation:spdFlick .6s ease-in-out .4s  infinite;transform-origin:right center}
    .logo.driving .logo-svg { animation: driveJiggle .14s linear infinite; }
    .logo.driving .puff1, .logo.driving .puff2, .logo.driving .puff3 { animation-duration: .4s; }
    .logo.driving .spd1,  .logo.driving .spd2,  .logo.driving .spd3  { animation-duration: .18s; }
    .sub { text-align: center; color: var(--dim); font-size: .85rem; margin-bottom: 24px; }
    label { display: block; font-size: .8rem; color: var(--dim); margin-bottom: 6px; margin-top: 14px; }
    input {
      width: 100%; padding: 10px 12px; font-size: .95rem; font-family: inherit;
      border: 1.5px solid var(--border); border-radius: 9px; background: var(--bg);
      color: var(--text); outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--teal-md); background: var(--surface); }
    button {
      width: 100%; margin-top: 22px; padding: 11px; font-size: .95rem; font-weight: 600;
      font-family: inherit; background: var(--teal); color: #fff; border: none;
      border-radius: 9px; cursor: pointer; transition: background .15s;
    }
    button:hover { background: #0F766E; }
    button:disabled { opacity: .6; cursor: wait; }
    .err {
      margin-top: 14px; padding: 9px 12px; background: #FEF2F2; border: 1.5px solid #FCA5A5;
      color: #B91C1C; border-radius: 8px; font-size: .82rem; display: none;
    }
    .err.show { display: block; }
  </style>
</head>
<body>

<form class="card" id="form">
  <div class="logo" id="logo">
    <svg class="logo-svg" viewBox="0 0 140 82" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="66" cy="77" rx="58" ry="4" fill="rgba(0,0,0,.07)"/>
      <circle cx="119" cy="9" r="5.5" fill="#CBD5E1" class="puff1"/>
      <circle cx="119" cy="4" r="4"   fill="#E2E8F0" class="puff2"/>
      <circle cx="119" cy="0" r="3"   fill="#F1F5F9" class="puff3"/>
      <line x1="8" y1="36" x2="-2" y2="36" stroke="#99F6E4" stroke-width="2"   stroke-linecap="round" class="spd1"/>
      <line x1="8" y1="43" x2="-4" y2="43" stroke="#CCFBF1" stroke-width="1.5" stroke-linecap="round" class="spd2"/>
      <line x1="8" y1="50" x2="-1" y2="50" stroke="#99F6E4" stroke-width="2"   stroke-linecap="round" class="spd3"/>
      <rect x="6"  y="12" width="72" height="48" rx="2" fill="#14B8A6"/>
      <rect x="6"  y="12" width="5"  height="48" rx="1" fill="#0D9488"/>
      <rect x="73" y="12" width="5"  height="48" rx="1" fill="#0D9488"/>
      <line x1="6" y1="24" x2="78" y2="24" stroke="#0D9488" stroke-width="2" opacity=".65"/>
      <line x1="6" y1="36" x2="78" y2="36" stroke="#0D9488" stroke-width="2" opacity=".65"/>
      <line x1="6" y1="48" x2="78" y2="48" stroke="#0D9488" stroke-width="2" opacity=".65"/>
      <line x1="42" y1="12" x2="42" y2="60" stroke="#0D9488" stroke-width="1.5" opacity=".5"/>
      <rect x="82" y="18" width="46" height="42" rx="10" fill="#0D9488"/>
      <rect x="86" y="23" width="22" height="22" rx="5"  fill="#BAE6FD" opacity=".9"/>
      <rect x="113" y="11" width="7" height="13" rx="3" fill="#0F766E"/>
      <ellipse cx="129" cy="40" rx="5"   ry="4.5" fill="#FEF08A"/>
      <ellipse cx="129" cy="40" rx="7.5" ry="6"   fill="#FEF9C3" opacity=".35"/>
      <rect x="6"   y="35" width="4" height="9" rx="2" fill="#FCA5A5"/>
      <rect x="126" y="51" width="8" height="4" rx="2" fill="#134E4A"/>
      <circle cx="28"  cy="68" r="11" fill="#1E293B"/><circle cx="28"  cy="68" r="4.5" fill="#374151"/><circle cx="28"  cy="68" r="2"   fill="#6B7280"/>
      <circle cx="52"  cy="68" r="11" fill="#1E293B"/><circle cx="52"  cy="68" r="4.5" fill="#374151"/><circle cx="52"  cy="68" r="2"   fill="#6B7280"/>
      <circle cx="106" cy="68" r="13" fill="#1E293B"/><circle cx="106" cy="68" r="5.5" fill="#374151"/><circle cx="106" cy="68" r="2.5" fill="#6B7280"/>
      <path d="M88 30 Q91.5 28 95 30"   stroke="#134E4A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M97 30 Q100.5 28 104 30" stroke="#134E4A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M89 37 Q92.5 39.5 96 37" stroke="#134E4A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
    <span class="logo-text"><span class="lg">TID</span><span class="lp">TAM</span></span>
  </div>
  <div class="sub">เข้าสู่ระบบเพื่อใช้งาน</div>

  <label for="email">อีเมล</label>
  <input id="email" type="email" required autocomplete="email" autofocus/>

  <label for="pwd">รหัสผ่าน</label>
  <input id="pwd" type="password" required autocomplete="current-password"/>

  <button id="btn" type="submit">เข้าสู่ระบบ</button>
  <div class="err" id="err"></div>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script src="./auth.js"></script>
<script>
  // ถ้า login อยู่แล้ว → ไป dashboard
  tidtamAuth.session().then(s => { if (s) location.href = 'index.html'; });

  const form = document.getElementById('form');
  const btn  = document.getElementById('btn');
  const err  = document.getElementById('err');

  const logo = document.getElementById('logo');

  form.onsubmit = async (e) => {
    e.preventDefault();
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'กำลังเข้าสู่ระบบ...';
    logo.classList.add('driving');

    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('pwd').value,
    });

    if (error) {
      err.textContent = error.message === 'Invalid login credentials'
        ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'
        : error.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
      logo.classList.remove('driving');
      return;
    }

    location.href = 'index.html';
  };
</script>

</body>
</html>
