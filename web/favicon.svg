  <line x1="5"  y1="74"  x2="91" y2="74"  stroke="#0D9488" stroke-width="2.5"/>
  <line x1="5"  y1="90"  x2="91" y2="90"  stroke="#0D9488" stroke-width="2.5"/>
  <line x1="5"  y1="106" x2="91" y2="106" stroke="#0D9488" stroke-width="2.5"/>
